  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2;
    --warm: #f2ece0;
    --card: #ffffff;
    --ink: #1a1510;
    --ink2: #5a5248;
    --ink3: #9c9289;
    --border: #e5ddd0;
    --best: #1a6b3a;
    --best-bg: #eef8f2;
    --best-border: #a8dbbe;
    --accent: #c2410c;
    --mid: #854d0e;
    --mid-bg: #fffbeb;
    --shadow: 0 1px 3px rgba(26,21,16,0.07), 0 4px 16px rgba(26,21,16,0.05);
    --shadow-lg: 0 2px 8px rgba(26,21,16,0.08), 0 12px 40px rgba(26,21,16,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 32px 16px 64px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(26,21,16,0.07) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { max-width: 1000px; margin: 0 auto; position: relative; z-index: 1; }

  header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.5s ease both;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(28px, 5vw, 46px);
    font-weight: 700;
    color: var(--ink);
    line-height: 1.05;
    margin-bottom: 10px;
  }

  h1 em { font-style: italic; color: var(--accent); }
  .subtitle { font-size: 15px; color: var(--ink2); font-weight: 300; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    box-shadow: var(--shadow);
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    animation: fadeUp 0.4s ease both;
    display: flex;
    flex-direction: column;
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }

  .card:focus-within { border-color: #c2a882; box-shadow: var(--shadow-lg); }

  .card.best-value {
    border-color: var(--best-border);
    background: var(--best-bg);
    box-shadow: 0 0 0 3px rgba(168,219,190,0.35), var(--shadow-lg);
  }

  .card.worst-value { border-color: #f5c6b5; background: #fff8f5; }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .card-num {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink3);
    line-height: 1;
  }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 99px;
    font-weight: 500;
  }

  .badge.best { background: var(--best); color: #fff; }
  .badge.worst { background: #f87171; color: #fff; }
  .badge.mid { background: var(--mid-bg); color: var(--mid); border: 1px solid #fcd34d; }

  .field { margin-bottom: 11px; }

  label {
    display: block;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 4px;
  }

  input[type="text"],
  input[type="number"],
  select {
    width: 100%;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.18s, background 0.18s;
    -webkit-appearance: none;
  }

  input:focus, select:focus { border-color: #c2a882; background: #fff; }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 8px;
    padding: 4px 0 0;
  }

  .divider { height: 1px; background: var(--border); margin: 14px 0; }

  .offer-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    margin-bottom: 8px;
  }

  .offer-toggle input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .offer-toggle span { font-size: 12px; font-weight: 500; color: var(--ink2); }

  .offer-fields { display: none; flex-direction: column; gap: 8px; }
  .offer-fields.open { display: flex; }

  .bxfy-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .result-area {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1.5px dashed var(--border);
    text-align: center;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }

  .unit-price {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }

  .unit-price.best-val { color: var(--best); }
  .unit-label { font-size: 11px; color: var(--ink3); font-weight: 300; }

  .norm-price {
    margin-top: 5px;
    padding: 4px 10px;
    background: var(--warm);
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink2);
  }

  .norm-price.best-norm {
    background: rgba(26,107,58,0.1);
    color: var(--best);
    font-weight: 500;
  }

  .eff-price {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink3);
  }

  .empty-state { font-size: 12px; color: var(--ink3); font-style: italic; }

  /* Results banner */
  .results-banner {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
    box-shadow: var(--shadow);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .results-banner.visible { opacity: 1; }

  .banner-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
  }

  .results-banner h2 {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
  }

  .norm-control {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .norm-control label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink3);
    margin: 0;
    white-space: nowrap;
  }

  .norm-control select {
    width: auto;
    font-size: 13px;
    padding: 6px 10px;
    background: var(--warm);
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 18px;
    background: var(--warm);
    border-radius: 10px;
    padding: 4px;
    width: fit-content;
  }

  .tab-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    background: transparent;
    color: var(--ink3);
    transition: all 0.18s;
  }

  .tab-btn.active { background: var(--card); color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .bar-list { display: flex; flex-direction: column; gap: 10px; }

  .bar-row {
    display: grid;
    grid-template-columns: 100px 1fr 110px;
    gap: 10px;
    align-items: center;
  }

  .bar-label {
    font-size: 13px;
    color: var(--ink2);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bar-track { height: 10px; background: var(--warm); border-radius: 99px; overflow: hidden; }

  .bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.34,1.2,0.64,1);
  }

  .bar-fill.best { background: var(--best); }
  .bar-fill.worst { background: #f87171; }
  .bar-fill.mid { background: var(--mid); }
  .bar-fill.only { background: var(--ink3); }

  .bar-val {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink2);
    text-align: right;
    line-height: 1.4;
  }

  .no-norm-msg {
    font-size: 13px;
    color: var(--ink3);
    font-style: italic;
    padding: 8px 0;
  }

  .savings-note {
    margin-top: 14px;
    padding: 12px 14px;
    background: var(--best-bg);
    border: 1px solid var(--best-border);
    border-radius: 10px;
    font-size: 13px;
    color: var(--best);
    font-weight: 500;
    display: none;
  }

  .savings-note.show { display: block; }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 540px) {
    .grid { grid-template-columns: 1fr 1fr; }
    .bar-row { grid-template-columns: 70px 1fr 90px; }
  }
  @media (max-width: 360px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Smart Shopping Tool</div>
    <h1>Which is the <em>best</em> deal?</h1>
    <p class="subtitle">Compare up to 4 products by true unit cost — even across different pack sizes and formats.</p>
  </header>

  <div class="grid" id="cardGrid"></div>

  <div class="results-banner" id="resultsBanner">
    <div class="banner-header">
      <h2>📊 Comparison</h2>
      <div class="norm-control">
        <label>Normalise to:</label>
        <select id="normUnit" onchange="calc()">
          <option value="">— per item (as entered) —</option>
          <optgroup label="Volume">
            <option value="ml">per ml</option>
            <option value="100ml">per 100ml</option>
            <option value="litre">per litre</option>
          </optgroup>
          <optgroup label="Weight">
            <option value="g">per g</option>
            <option value="100g">per 100g</option>
            <option value="kg">per kg</option>
          </optgroup>
          <optgroup label="Count">
            <option value="each">per single item</option>
          </optgroup>
        </select>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tabBtnPack" onclick="switchTab('pack')">Per item</button>
      <button class="tab-btn" id="tabBtnNorm" onclick="switchTab('norm')">Normalised</button>
    </div>

    <div class="tab-panel active" id="tabPack">
      <div class="bar-list" id="barListPack"></div>
      <div class="savings-note" id="savingsNotePack"></div>
    </div>

    <div class="tab-panel" id="tabNorm">
      <div id="normContent"></div>
      <div class="savings-note" id="savingsNoteNorm"></div>
    </div>
  </div>

</div>

<script>
// Convert each unit to its base: volume→ml, weight→g, length→mm, count→1
const TO_BASE = {
  ml:1, cl:10, '100ml':100, litre:1000, l:1000,
  g:1, '100g':100, kg:1000, oz:28.3495, lb:453.592,
  each:1,
  mm:1, cm:10, m:1000, '100m':100000
};

const FAMILY = {
  ml:'volume', cl:'volume', '100ml':'volume', litre:'volume', l:'volume',
  g:'weight', '100g':'weight', kg:'weight', oz:'weight', lb:'weight',
  each:'count',
  mm:'length', cm:'length', m:'length', '100m':'length'
};

// How many base units in each normalisation target
const NORM_BASE = { ml:1, '100ml':100, litre:1000, g:1, '100g':100, kg:1000, each:1 };
const NORM_FAMILY = { ml:'volume','100ml':'volume',litre:'volume', g:'weight','100g':'weight',kg:'weight', each:'count' };

const LABELS = ['Product A','Product B','Product C','Product D'];

const ITEM_UNITS = [
  {v:'each', l:'each (no size)'},
  {v:'ml',   l:'ml'},
  {v:'cl',   l:'cl'},
  {v:'litre',l:'litre'},
  {v:'g',    l:'g'},
  {v:'kg',   l:'kg'},
  {v:'oz',   l:'oz'},
  {v:'lb',   l:'lb'},
  {v:'m',    l:'m'},
];

function buildCards() {
  const grid = document.getElementById('cardGrid');
  for (let i = 0; i < 4; i++) grid.insertAdjacentHTML('beforeend', cardHTML(i));
}

function cardHTML(i) {
  const unitOpts = ITEM_UNITS.map(u => `<option value="${u.v}">${u.l}</option>`).join('');
  return `
  <div class="card" id="card${i}">
    <div class="card-header">
      <div class="card-num">${i+1}</div>
      <span class="badge" id="badge${i}" style="display:none"></span>
    </div>

    <div class="field">
      <label>Product name</label>
      <input type="text" id="name${i}" placeholder="${LABELS[i]}" oninput="calc()">
    </div>

    <div class="field">
      <label>Price (£)</label>
      <input type="number" id="price${i}" placeholder="0.00" min="0" step="0.01" oninput="calc()">
    </div>

    <div class="section-label">Pack contents</div>

    <div class="row-2">
      <div class="field">
        <label>No. of items</label>
        <input type="number" id="numItems${i}" placeholder="1" min="1" step="1" value="1" oninput="calc()">
      </div>
      <div class="field">
        <label>Size per item</label>
        <input type="number" id="itemSize${i}" placeholder="e.g. 330" min="0" step="any" oninput="calc()">
      </div>
    </div>

    <div class="field">
      <label>Size unit</label>
      <select id="itemUnit${i}" onchange="calc()">${unitOpts}</select>
    </div>

    <div class="divider"></div>

    <label class="offer-toggle">
      <input type="checkbox" id="offerChk${i}" onchange="toggleOffer(${i})">
      <span>🏷️ Special offer</span>
    </label>

    <div class="offer-fields" id="offerFields${i}">
      <div class="field">
        <label>Offer type</label>
        <select id="offerType${i}" onchange="toggleOfferType(${i}); calc()">
          <option value="bxfy">Buy X items for price of Y</option>
          <option value="multisave">X packs for £Y</option>
          <option value="pct">% Discount</option>
        </select>
      </div>
      <div class="bxfy-row" id="bxfyRow${i}">
        <div class="field">
          <label>Buy</label>
          <input type="number" id="buyX${i}" placeholder="3" min="1" step="1" oninput="calc()">
        </div>
        <div class="field">
          <label>Pay for</label>
          <input type="number" id="payY${i}" placeholder="2" min="1" step="1" oninput="calc()">
        </div>
      </div>
      <div class="field" id="pctRow${i}" style="display:none">
        <label>Discount %</label>
        <input type="number" id="discPct${i}" placeholder="20" min="0" max="100" step="any" oninput="calc()">
      </div>
      <div class="bxfy-row" id="multisaveRow${i}" style="display:none">
        <div class="field">
          <label>No. of packs</label>
          <input type="number" id="msQty${i}" placeholder="3" min="1" step="1" oninput="calc()">
        </div>
        <div class="field">
          <label>Total price (£)</label>
          <input type="number" id="msPrice${i}" placeholder="5.00" min="0" step="0.01" oninput="calc()">
        </div>
      </div>
    </div>

    <div class="result-area" id="result${i}">
      <div class="empty-state">Enter price &amp; size</div>
    </div>
  </div>`;
}

function toggleOffer(i) {
  document.getElementById(`offerFields${i}`).classList.toggle('open', document.getElementById(`offerChk${i}`).checked);
  calc();
}

function toggleOfferType(i) {
  const t = document.getElementById(`offerType${i}`).value;
  document.getElementById(`bxfyRow${i}`).style.display      = t === 'bxfy'      ? 'grid'  : 'none';
  document.getElementById(`pctRow${i}`).style.display        = t === 'pct'       ? 'block' : 'none';
  document.getElementById(`multisaveRow${i}`).style.display  = t === 'multisave' ? 'grid'  : 'none';
}

function switchTab(tab) {
  document.getElementById('tabBtnPack').classList.toggle('active', tab === 'pack');
  document.getElementById('tabBtnNorm').classList.toggle('active', tab === 'norm');
  document.getElementById('tabPack').classList.toggle('active', tab === 'pack');
  document.getElementById('tabNorm').classList.toggle('active', tab === 'norm');
}

function getEffPrice(i) {
  const price = parseFloat(document.getElementById(`price${i}`).value);
  if (!price || price <= 0) return null;
  let eff = price;
  if (document.getElementById(`offerChk${i}`).checked) {
    const type = document.getElementById(`offerType${i}`).value;
    if (type === 'bxfy') {
      const x = parseFloat(document.getElementById(`buyX${i}`).value);
      const y = parseFloat(document.getElementById(`payY${i}`).value);
      if (x > 0 && y > 0 && y <= x) eff = (y / x) * price;
    } else if (type === 'multisave') {
      const msQty   = parseFloat(document.getElementById(`msQty${i}`).value);
      const msPrice = parseFloat(document.getElementById(`msPrice${i}`).value);
      if (msQty > 0 && msPrice > 0) eff = msPrice / msQty;
    } else {
      const pct = parseFloat(document.getElementById(`discPct${i}`).value);
      if (pct > 0 && pct < 100) eff = price * (1 - pct / 100);
    }
  }
  return eff;
}

function getProductData(i) {
  const effPrice = getEffPrice(i);
  if (!effPrice) return null;

  const origPrice = parseFloat(document.getElementById(`price${i}`).value);
  const numItems  = parseFloat(document.getElementById(`numItems${i}`).value) || 1;
  const itemSize  = parseFloat(document.getElementById(`itemSize${i}`).value);
  const unit      = document.getElementById(`itemUnit${i}`).value;

  const pricePerItem = effPrice / numItems;
  const family = FAMILY[unit] || 'count';

  // Total volume/weight/etc in base units across whole pack
  let totalBaseUnits = null;
  if (unit !== 'each' && itemSize > 0) {
    totalBaseUnits = numItems * itemSize * (TO_BASE[unit] || 1);
  }

  return { i, effPrice, origPrice, numItems, itemSize, unit, family, pricePerItem, totalBaseUnits };
}

function calcNormPrice(d, normUnit) {
  if (!d || !d.totalBaseUnits) return null;
  if (NORM_FAMILY[normUnit] !== d.family) return null;
  // price per normUnit = effPrice / totalBaseUnits * normBase
  return (d.effPrice / d.totalBaseUnits) * NORM_BASE[normUnit];
}

function fmt(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  if (v < 0.001) return v.toFixed(5);
  if (v < 0.01)  return v.toFixed(4);
  if (v < 1)     return v.toFixed(3);
  return v.toFixed(2);
}

function fmtU(u) {
  return { litre:'litre','100ml':'100ml', ml:'ml', kg:'kg','100g':'100g', g:'g', each:'item', oz:'oz', lb:'lb', m:'m' }[u] || u;
}

function calc() {
  const normUnit = document.getElementById('normUnit').value;
  const allData  = Array.from({length:4}, (_,i) => getProductData(i));

  // Valid per-item
  const validItems = allData.filter(d => d !== null);

  // Valid normalised
  const validNorm = normUnit
    ? allData.filter(d => d && calcNormPrice(d, normUnit) !== null).map(d => ({ ...d, np: calcNormPrice(d, normUnit) }))
    : [];

  // Rank: prefer norm if ≥2 products can be normalised, else per-item
  const rankData = (normUnit && validNorm.length >= 2)
    ? validNorm.map(d => ({ i: d.i, score: d.np }))
    : validItems.map(d => ({ i: d.i, score: d.pricePerItem }));

  const sorted = [...rankData].sort((a,b) => a.score - b.score);

  // Apply card styles + badges
  for (let i = 0; i < 4; i++) {
    document.getElementById(`card${i}`).classList.remove('best-value','worst-value');
    const badge = document.getElementById(`badge${i}`);
    badge.style.display = 'none';
  }

  if (sorted.length >= 2) {
    sorted.forEach((r, rank) => {
      const card  = document.getElementById(`card${r.i}`);
      const badge = document.getElementById(`badge${r.i}`);
      badge.style.display = '';
      if (rank === 0) {
        card.classList.add('best-value');
        badge.className = 'badge best'; badge.textContent = '★ Best';
      } else if (rank === sorted.length - 1) {
        card.classList.add('worst-value');
        badge.className = 'badge worst'; badge.textContent = 'Priciest';
      } else {
        badge.className = 'badge mid'; badge.textContent = `#${rank+1}`;
      }
    });
  }

  // --- Update each card result area ---
  for (let i = 0; i < 4; i++) {
    const area = document.getElementById(`result${i}`);
    const d = allData[i];
    if (!d) { area.innerHTML = `<div class="empty-state">Enter price &amp; size</div>`; continue; }

    const isBestItem = validItems.length > 1 && d.pricePerItem === Math.min(...validItems.map(x=>x.pricePerItem));
    const priceClass = isBestItem ? 'unit-price best-val' : 'unit-price';

    const packDesc = (d.itemSize && d.unit !== 'each')
      ? `${d.numItems} × ${d.itemSize}${fmtU(d.unit)}`
      : `${d.numItems} item${d.numItems > 1 ? 's' : ''}`;

    // Was price note if offer active
    let effNote = '';
    if (document.getElementById(`offerChk${i}`).checked && d.origPrice !== d.effPrice) {
      const origPPI = d.origPrice / d.numItems;
      effNote = `<div class="eff-price">Was £${fmt(origPPI)} / item</div>`;
    }

    // Normalised line on card
    let normLine = '';
    if (normUnit) {
      const np = calcNormPrice(d, normUnit);
      if (np !== null) {
        const isBestNorm = validNorm.length > 1 && np === Math.min(...validNorm.map(x=>x.np));
        normLine = `<div class="norm-price${isBestNorm?' best-norm':''}">£${fmt(np)} per ${fmtU(normUnit)}</div>`;
      } else if (d.totalBaseUnits === null) {
        normLine = `<div class="norm-price" style="opacity:0.45">Add size for ${fmtU(normUnit)} price</div>`;
      } else {
        normLine = `<div class="norm-price" style="opacity:0.45">Unit mismatch</div>`;
      }
    }

    area.innerHTML = `
      <div class="${priceClass}">£${fmt(d.pricePerItem)}</div>
      <div class="unit-label">per item · ${packDesc}</div>
      ${effNote}
      ${normLine}
    `;
  }

  updateBanner(allData, validItems, validNorm, normUnit);
}

function updateBanner(allData, validItems, validNorm, normUnit) {
  const banner = document.getElementById('resultsBanner');
  if (validItems.length < 2) { banner.classList.remove('visible'); return; }
  banner.classList.add('visible');

  // --- Per-item tab ---
  const sortedItems = [...validItems].sort((a,b) => a.pricePerItem - b.pricePerItem);
  const maxItem = Math.max(...sortedItems.map(d=>d.pricePerItem));

  document.getElementById('barListPack').innerHTML = sortedItems.map((d, rank) => {
    const name = document.getElementById(`name${d.i}`).value.trim() || LABELS[d.i];
    const packDesc = (d.itemSize && d.unit !== 'each') ? `${d.numItems}×${d.itemSize}${fmtU(d.unit)}` : `${d.numItems} item${d.numItems>1?'s':''}`;
    const w = Math.max(6, (d.pricePerItem / maxItem) * 100).toFixed(1);
    const fc = sortedItems.length === 1 ? 'only' : rank===0?'best':rank===sortedItems.length-1?'worst':'mid';
    return `<div class="bar-row">
      <div class="bar-label" title="${name}">${name}</div>
      <div class="bar-track"><div class="bar-fill ${fc}" style="width:${w}%"></div></div>
      <div class="bar-val">£${fmt(d.pricePerItem)}/item<br><span style="font-size:9px;color:var(--ink3)">${packDesc}</span></div>
    </div>`;
  }).join('');

  const packNote = document.getElementById('savingsNotePack');
  if (sortedItems.length >= 2 && sortedItems[0].pricePerItem < sortedItems[sortedItems.length-1].pricePerItem) {
    const bn = document.getElementById(`name${sortedItems[0].i}`).value.trim() || LABELS[sortedItems[0].i];
    const wn = document.getElementById(`name${sortedItems[sortedItems.length-1].i}`).value.trim() || LABELS[sortedItems[sortedItems.length-1].i];
    packNote.textContent = `💡 ${bn} is ${((1 - sortedItems[0].pricePerItem / sortedItems[sortedItems.length-1].pricePerItem)*100).toFixed(0)}% cheaper per item than ${wn}`;
    packNote.classList.add('show');
  } else { packNote.classList.remove('show'); }

  // --- Normalised tab ---
  const nc = document.getElementById('normContent');
  const nn = document.getElementById('savingsNoteNorm');

  if (!normUnit) {
    nc.innerHTML = `<div class="no-norm-msg">Select a unit above (e.g. <strong>per litre</strong>) to compare products on a true like-for-like basis — great for different pack sizes.</div>`;
    nn.classList.remove('show'); return;
  }

  if (validNorm.length < 2) {
    nc.innerHTML = `<div class="no-norm-msg">Need at least 2 products with compatible sizes for <strong>per ${fmtU(normUnit)}</strong> comparison. Make sure sizes are entered and units match (e.g. both ml/litre for volume).</div>`;
    nn.classList.remove('show'); return;
  }

  const sortedNorm = [...validNorm].sort((a,b) => a.np - b.np);
  const maxNorm = Math.max(...sortedNorm.map(d=>d.np));

  nc.innerHTML = `<div class="bar-list">` + sortedNorm.map((d, rank) => {
    const name = document.getElementById(`name${d.i}`).value.trim() || LABELS[d.i];
    const packDesc = `${d.numItems}×${d.itemSize}${fmtU(d.unit)}`;
    const w = Math.max(6, (d.np / maxNorm) * 100).toFixed(1);
    const fc = sortedNorm.length === 1 ? 'only' : rank===0?'best':rank===sortedNorm.length-1?'worst':'mid';
    return `<div class="bar-row">
      <div class="bar-label" title="${name}">${name}</div>
      <div class="bar-track"><div class="bar-fill ${fc}" style="width:${w}%"></div></div>
      <div class="bar-val">£${fmt(d.np)}/${fmtU(normUnit)}<br><span style="font-size:9px;color:var(--ink3)">${packDesc}</span></div>
    </div>`;
  }).join('') + `</div>`;

  if (sortedNorm[0].np < sortedNorm[sortedNorm.length-1].np) {
    const bn = document.getElementById(`name${sortedNorm[0].i}`).value.trim() || LABELS[sortedNorm[0].i];
    const wn = document.getElementById(`name${sortedNorm[sortedNorm.length-1].i}`).value.trim() || LABELS[sortedNorm[sortedNorm.length-1].i];
    nn.textContent = `💡 ${bn} is ${((1 - sortedNorm[0].np / sortedNorm[sortedNorm.length-1].np)*100).toFixed(0)}% cheaper per ${fmtU(normUnit)} than ${wn}`;
    nn.classList.add('show');
  } else { nn.classList.remove('show'); }
}

buildCards();
</script>
